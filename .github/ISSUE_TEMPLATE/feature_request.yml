name: Feature request
description: Suggest a new capability for AetherPulse|Music
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What should this improve?
      description: Explain the user need or workflow.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Suggested solution
      description: Describe the behavior you want.
    validations:
      required: true