name: Bug report
description: Report a problem in AetherPulse|Music
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and browser
      placeholder: iPhone Safari, Android Chrome, Desktop Chrome