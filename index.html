<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="AetherPulse Music - responsywny odtwarzacz muzyki z wyszukiwaniem YouTube Music, playlistami, ulubionymi i historią odtwarzania."
    />
    <link rel="icon" type="image/x-icon" sizes="any" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="icon" type="image/x-icon" sizes="32x32" href="/icon.svg" />
    <link rel="icon" type="image/x-icon" sizes="192x192" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect: szybsze nawiązanie połączenia z najczęstszymi origin -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://yt3.googleusercontent.com" />
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com" />

    <!-- Critical CSS inline (LCP improvement) — placeholder w trakcie ładowania bundla -->
    <style>
      :root {
        color-scheme: dark light;
      }
      html, body {
        background: #000;
        color: #fff;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #app:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 50% 40%, #1a1a1a 0%, #000 70%);
        animation: ap-boot 1.2s ease-out infinite alternate;
      }
      @keyframes ap-boot {
        from { opacity: 0.6; }
        to   { opacity: 1; }
      }
    </style>

    <title>AetherPulse Music</title>
  </head>
  <body>
    <noscript>Musisz włączyć JavaScript, aby uruchomić tę aplikację.</noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
