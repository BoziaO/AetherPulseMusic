<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon2.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050816" />
    <meta name="description" content="AetherPulseMusic — responsywny odtwarzacz muzyki z wyszukiwaniem YouTube Music, playlistami, ulubionymi i historią odtwarzania." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preconnect for YouTube API -->
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://music.youtube.com" />

    <!-- Critical inline styles to prevent FOUC on load -->
    <style>
      :root {
        --bg-main: #050816;
        --primary: #8b5cf6;
        --text-main: #ffffff;
      }
      html, body, #root {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background-color: var(--bg-main);
        color: var(--text-main);
      }
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: var(--bg-main);
        z-index: 9999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .loader-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        animation: loader-pulse 1.8s ease-in-out infinite;
      }
      .loader-icon {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        background: linear-gradient(135deg, #8b5cf6, #a78bfa);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        box-shadow: 0 0 32px rgba(139, 92, 246, 0.5);
      }
      .loader-name {
        font-family: "Space Grotesk", "Manrope", system-ui, sans-serif;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -0.04em;
        color: #ffffff;
      }
      .loader-name span { color: #8b5cf6; }
      .loader-bar-wrap {
        width: 160px;
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 99px;
        overflow: hidden;
      }
      .loader-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #8b5cf6, #a78bfa);
        border-radius: 99px;
        animation: loader-fill 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes loader-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.75; }
      }
      @keyframes loader-fill {
        0%   { width: 0%; }
        60%  { width: 75%; }
        100% { width: 100%; }
      }
    </style>

    <title>AetherPulse</title>
  </head>
  <body>
    <noscript>Musisz włączyć JavaScript, aby uruchomić tę aplikację.</noscript>

    <!-- Splash / Loading screen -->
    <div id="app-loader">
      <div class="loader-logo">
        <div class="loader-icon">⚡</div>
        <div class="loader-name">AetherPulse<span>Music</span></div>
      </div>
      <div class="loader-bar-wrap">
        <div class="loader-bar"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Hide loader once React mounts
      (function() {
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(m) {
            if (m.addedNodes.length) {
              var loader = document.getElementById('app-loader');
              if (loader) {
                loader.classList.add('hidden');
                setTimeout(function() {
                  if (loader.parentNode) loader.parentNode.removeChild(loader);
                }, 500);
              }
              observer.disconnect();
            }
          });
        });
        observer.observe(document.getElementById('root'), { childList: true });
      })();
    </script>
  </body>
</html>
